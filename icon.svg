<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e1b4b"/>
      <stop offset="50%" stop-color="#312e81"/>
      <stop offset="100%" stop-color="#1e1b4b"/>
    </linearGradient>
    <linearGradient id="iris" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#60a5fa"/>
      <stop offset="40%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#f472b6"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#93c5fd" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#c084fc" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="pupilGlow" cx="45%" cy="40%">
      <stop offset="0%" stop-color="#1e1b4b"/>
      <stop offset="70%" stop-color="#0f0a2e"/>
      <stop offset="100%" stop-color="#000"/>
    </radialGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="0" stdDeviation="12" flood-color="#818cf8" flood-opacity="0.5"/>
    </filter>
    <filter id="innerGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="6" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="108" fill="url(#bg)"/>

  <!-- Subtle grid lines for "measurement" feel -->
  <g opacity="0.08" stroke="#a5b4fc" stroke-width="1">
    <line x1="256" y1="60" x2="256" y2="452"/>
    <line x1="60" y1="256" x2="452" y2="256"/>
    <circle cx="256" cy="256" r="80" fill="none"/>
    <circle cx="256" cy="256" r="160" fill="none"/>
  </g>

  <!-- Outer glow ring -->
  <ellipse cx="256" cy="256" rx="175" ry="110" fill="none" stroke="url(#glow)" stroke-width="18" opacity="0.4" filter="url(#shadow)"/>

  <!-- Eye white (sclera) -->
  <ellipse cx="256" cy="256" rx="160" ry="100" fill="#f0f0f8" opacity="0.95"/>

  <!-- Iris -->
  <circle cx="256" cy="256" r="80" fill="url(#iris)" filter="url(#innerGlow)"/>

  <!-- Iris detail rings -->
  <circle cx="256" cy="256" r="72" fill="none" stroke="#7c3aed" stroke-width="1.5" opacity="0.3"/>
  <circle cx="256" cy="256" r="58" fill="none" stroke="#6366f1" stroke-width="1" opacity="0.25"/>

  <!-- Iris radial lines -->
  <g opacity="0.15" stroke="#c4b5fd" stroke-width="1.2">
    <line x1="256" y1="176" x2="256" y2="196"/>
    <line x1="256" y1="316" x2="256" y2="336"/>
    <line x1="176" y1="256" x2="196" y2="256"/>
    <line x1="316" y1="256" x2="336" y2="256"/>
    <line x1="199" y1="199" x2="213" y2="213"/>
    <line x1="299" y1="299" x2="313" y2="313"/>
    <line x1="313" y1="199" x2="299" y2="213"/>
    <line x1="199" y1="313" x2="213" y2="299"/>
  </g>

  <!-- Pupil -->
  <circle cx="256" cy="256" r="32" fill="url(#pupilGlow)"/>

  <!-- Pupil highlight -->
  <circle cx="243" cy="243" r="10" fill="white" opacity="0.85"/>
  <circle cx="268" cy="262" r="5" fill="white" opacity="0.4"/>

  <!-- Crosshair / target reticle over the eye -->
  <g stroke="#f472b6" stroke-width="2.5" opacity="0.7">
    <line x1="256" y1="130" x2="256" y2="160"/>
    <line x1="256" y1="352" x2="256" y2="382"/>
    <line x1="130" y1="256" x2="160" y2="256"/>
    <line x1="352" y1="256" x2="382" y2="256"/>
  </g>
  <circle cx="256" cy="256" r="105" fill="none" stroke="#f472b6" stroke-width="1.5" opacity="0.35" stroke-dasharray="8 6"/>

  <!-- Ruler ticks at bottom -->
  <g stroke="#fbbf24" stroke-width="2" opacity="0.6">
    <line x1="120" y1="420" x2="120" y2="435"/>
    <line x1="168" y1="425" x2="168" y2="435"/>
    <line x1="216" y1="420" x2="216" y2="435"/>
    <line x1="264" y1="425" x2="264" y2="435"/>
    <line x1="312" y1="420" x2="312" y2="435"/>
    <line x1="360" y1="425" x2="360" y2="435"/>
    <line x1="392" y1="420" x2="392" y2="435"/>
    <line x1="120" y1="435" x2="392" y2="435"/>
  </g>
  <text x="122" y="452" font-family="monospace" font-size="11" fill="#fbbf24" opacity="0.5">0m</text>
  <text x="370" y="452" font-family="monospace" font-size="11" fill="#fbbf24" opacity="0.5">100m</text>
</svg>
